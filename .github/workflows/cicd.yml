name: DevOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Build Docker Image
      run: docker build -t devops-lab-app ./app

    - name: Skip Deployment (No cluster in CI)
      run: echo "Deployment skipped - no Kubernetes cluster configured"