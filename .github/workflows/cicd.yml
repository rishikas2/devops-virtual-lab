name: DevOps CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build-deploy:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Code
      uses: actions/checkout@v3

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

    - name: Build and Push Docker Image (latest)
      run: |
        docker build -t ${{ secrets.DOCKER_USERNAME }}/devops-lab-app:latest ./app
        docker push ${{ secrets.DOCKER_USERNAME }}/devops-lab-app:latest

    - name: Deploy to EC2
      uses: appleboy/ssh-action@v0.1.6
      with:
        host: ${{ secrets.EC2_HOST }}
        username: ec2-user
        key: ${{ secrets.EC2_KEY }}
        script: |
          cd devops-virtual-lab
          git pull
          kubectl set image deployment/devops-app devops-container=${{ secrets.DOCKER_USERNAME }}/devops-lab-app:latest